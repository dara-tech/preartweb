name: Deploy to Production

on:
  push:
    branches:
      - main
      - master # Triggers on both main and master to be safe

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Package Application
        run: |
          # Package backend (excluding node_modules and env files)
          tar czf backend.tar.gz --exclude='node_modules' --exclude='.env' -C backend .
          
          # Package frontend dist
          tar czf frontend_dist.tar.gz -C frontend/dist .

      - name: Copy Files to Server
        uses: appleboy/scp-action@master
        with:
          host: 172.104.33.79
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend.tar.gz,frontend_dist.tar.gz"
          target: "/tmp/"

      - name: Execute Deployment Script on Server
        uses: appleboy/ssh-action@master
        with:
          host: 172.104.33.79
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            chmod +x /root/deploy_artweb.sh
            /root/deploy_artweb.sh
